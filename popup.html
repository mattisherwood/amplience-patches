<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amplience Patches</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #ffffff;
            --fg-rgb: 31, 41, 55;
            --fg: rgb(var(--fg-rgb));
            --spacing: 12px;
            --hover: rgba(var(--fg-rgb), 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111827;
                --fg-rgb: 229, 231, 235;
                --fg: rgb(var(--fg-rgb));
                --hover: rgba(var(--fg-rgb), 0.1);
            }
        }

        body {
            margin: 0;
            width: 220px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--fg);
        }

        ul {
            border-bottom: solid 1px var(--hover);
            list-style: none;
            margin: 0;
            padding: 0;
        }

        input {
            margin: 0;
        }

        a,
        label {
            display: flex;
            align-items: center;
            gap: calc(var(--spacing) * 0.5);
            padding: var(--spacing);
            color: inherit;
            cursor: pointer;
            text-decoration: none;
        }

        a:hover,
        label:hover {
            background: var(--hover);
        }

        a:focus-visible {
            outline-offset: -1px;
        }

        li a,
        li label {
            padding: calc(var(--spacing) * 0.5) var(--spacing);
        }

        li:first-of-type a,
        li:first-of-type label {
            padding-top: var(--spacing);
        }

        li:last-of-type a,
        li:last-of-type label {
            padding-bottom: var(--spacing);
        }

        .theme-control {
            display: flex;
            align-items: center;
            gap: calc(var(--spacing) * 0.5);
            padding: var(--spacing);
            border-bottom: solid 1px var(--hover);

            label {
                padding: 0;
            }
        }

        .color-swatch {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: solid 1px rgba(var(--fg-rgb), 0.3);
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <ul>
        <li>
            <label for="flowFilter">
                <input type="checkbox" id="flowFilter" />
                Enable Flows Filter
            </label>
        </li>

        <li>
            <label for="hotkeysEnabled">
                <input type="checkbox" id="hotkeysEnabled" />
                Enable Hotkeys
            </label>
        </li>

        <li>
            <label for="stylesEnabled">
                <input type="checkbox" id="stylesEnabled" />
                Enable Styles Patches
            </label>
        </li>

        <li>
            <label for="themingEnabled">
                <input type="checkbox" id="themingEnabled" />
                Enable Theming
            </label>
        </li>
    </ul>

    <div id="themeControls" hidden>

        <div class="theme-control">
            <label for="themingColor">
                <span class="color-swatch" id="themingColorSwatch"></span>
                <input type="text" id="themingColor" size="14" placeholder="60, 120, 200" />
            </label>

            <label for="themingDark">
                <input type="checkbox" id="themingDark" /> Dark
            </label>
        </div>
    </div>

    <a href="options.html" target="_blank" rel="noopener">View all options...</a>

    <script src="color-picker.js"></script>
    <script src="popup.js"></script>
</body>

</html>
